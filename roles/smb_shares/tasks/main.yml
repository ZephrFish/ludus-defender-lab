      ═══════════════════════════════════════════════════════════════

- name: Show SMB shares deployment status
  ansible.builtin.debug:
    msg:
      - "════════════════════════════════════════════"
      - "  smb_shares — Deployment Complete"
      - "════════════════════════════════════════════"
      - "  Host     : {{ inventory_hostname }}"
      - "  Shares   : IT, HR, Finance, Security, Backups, Deploy, Honeypot"
      - "  Info     : C:\\Tools\\smb-shares-info.txt"
      - "════════════════════════════════════════════"

- name: Log successful deployment
  ansible.windows.win_powershell:
    script: |
      Add-Content -Path 'C:\Windows\Temp\zsec-ansible.log' `
        -Value "OK smb_shares on {{ inventory_hostname }}" `
        -ErrorAction SilentlyContinue
  ignore_errors: true
